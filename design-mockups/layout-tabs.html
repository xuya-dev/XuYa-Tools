<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>④ 顶部标签页</title>
<link rel="stylesheet" href="shared.css">
<style>
  .app { height:100%; display:flex; flex-direction:column; }
  .tabbar { display:flex; align-items:flex-end; gap:2px; padding:6px 8px 0; background:var(--bg-elev); border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab { display:flex; align-items:center; gap:8px; padding:8px 12px; font-size:12.5px; color:var(--text-2); background:transparent; border-radius:8px 8px 0 0; cursor:pointer; transition:.1s; max-width:180px; }
  .tab.active { background:var(--bg); color:var(--text); }
  .tab .t-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tab .t-close { width:16px; height:16px; border-radius:4px; display:flex; align-items:center; justify-content:center; opacity:.5; }
  .tab .t-close:hover { background:var(--input); opacity:1; }
  .tab-new { padding:8px 10px; color:var(--text-3); }
  .launcher { flex:1; overflow:auto; padding:30px 32px; }
  .launcher.show { display:block; }
  .launcher.hide { display:none; }
  .l-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .workspace { flex:1; overflow:auto; padding:24px 28px; }
  .workspace.hide { display:none; }
</style>
</head>
<body>
<div class="app" id="root"></div>
<script src="shared.js"></script>
<script src="toolbody.js"></script>
<script>
let openTabs = [{id:'json'},{id:'cli'}]; // 预开两个标签
let active = 'cli';
let showLauncher = false;

const root=document.getElementById('root');
root.innerHTML = titlebarHTML() + `
  <div class="tabbar" id="tabbar"></div>
  <div class="launcher ${showLauncher?'show':'hide'}" id="launcher">
    <div class="section-label">打开新工具</div>
    <div class="l-grid" id="lgrid"></div>
  </div>
  <div class="workspace ${showLauncher?'hide':''}" id="ws"></div>`;

document.getElementById('lgrid').innerHTML = TOOLS.map(t=>`
  <button class="tool-card" onclick="openInTab('${t.id}')">
    <div class="tool-icon">${toolIcon(t)}</div>
    <div style="flex:1;min-width:0"><h3>${t.name}</h3><p>${t.desc}</p></div>
  </button>`).join('');

function renderTabs(){
  const tb=document.getElementById('tabbar');
  tb.innerHTML = openTabs.map(tab=>{
    const t=TOOLS.find(x=>x.id===tab.id);
    return `<div class="tab ${active===tab.id?'active':''}" onclick="switchTab('${tab.id}')">
      <span style="color:var(--accent)">${toolIcon(t,14)}</span>
      <span class="t-name">${t.name}</span>
      <span class="t-close" onclick="event.stopPropagation();closeTab('${tab.id}')">${svg('plus',12)}</span>
    </div>`;
  }).join(`<button class="tab tab-new" onclick="toggleLauncher()">${svg('plus',16)}</button>`);
}
function renderWS(){
  const t=TOOLS.find(x=>x.id===active);
  document.getElementById('ws').innerHTML = toolBodyHTML(t);
}
function switchTab(id){ active=id; showLauncher=false; update(); }
function openInTab(id){
  if(!openTabs.find(t=>t.id===id)) openTabs.push({id:id});
  active=id; showLauncher=false; update();
}
function closeTab(id){
  const idx=openTabs.findIndex(t=>t.id===id);
  openTabs.splice(idx,1);
  if(active===id) active = openTabs[Math.min(idx,openTabs.length-1)]?.id || null;
  if(!openTabs.length){ showLauncher=true; active=null; }
  update();
}
function toggleLauncher(){ showLauncher=!showLauncher; update(); }
function update(){
  renderTabs();
  document.getElementById('launcher').className = 'launcher '+(showLauncher?'show':'hide');
  document.getElementById('ws').className = 'workspace '+(showLauncher?'hide':'');
  if(active && !showLauncher) renderWS();
  else if(showLauncher) document.getElementById('ws').innerHTML='';
}
update();
</script>
</body>
</html>
