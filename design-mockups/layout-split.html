<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>⑤ 双栏 Master-Detail</title>
<link rel="stylesheet" href="shared.css">
<style>
  .app { height:100%; display:flex; flex-direction:column; }
  .body { flex:1; display:flex; min-height:0; }
  .master { width:300px; flex-shrink:0; background:var(--bg-elev); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .master-head { padding:14px 16px 10px; }
  .m-search { display:flex; align-items:center; gap:8px; padding:0 12px; height:36px; background:var(--input); border:1px solid var(--border); border-radius:8px; color:var(--text-3); }
  .m-search input { flex:1; border:none; background:none; color:var(--text); font-size:13px; outline:none; }
  .m-list { flex:1; overflow:auto; padding:4px 8px 16px; }
  .m-group { margin-top:10px; }
  .m-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; cursor:pointer; transition:.1s; width:100%; text-align:left; }
  .m-item:hover { background:var(--input); }
  .m-item.active { background:var(--accent-soft); }
  .m-item.active .m-name { color:var(--accent); font-weight:600; }
  .m-icon { width:30px; height:30px; border-radius:8px; background:var(--input); display:flex; align-items:center; justify-content:center; color:var(--text-2); flex-shrink:0; }
  .m-item.active .m-icon { background:var(--accent); color:#fff; }
  .m-info { flex:1; min-width:0; }
  .m-name { font-size:13px; color:var(--text); }
  .m-desc { font-size:11px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .detail { flex:1; overflow:auto; padding:24px 28px; display:flex; flex-direction:column; min-width:0; }
  .detail-head { display:flex; align-items:center; gap:10px; padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:18px; }
  .detail-head h1 { font-size:17px; font-weight:700; }
  .breadcrumb { font-size:11px; color:var(--text-3); }
</style>
</head>
<body>
<div class="app" id="root"></div>
<script src="shared.js"></script>
<script src="toolbody.js"></script>
<script>
let active='json';
function groupedTools(){
  const kw=document.getElementById('q')?.value.trim().toLowerCase()||'';
  const f = TOOLS.filter(t=>!kw||[t.name,t.desc].join(' ').toLowerCase().includes(kw));
  const g={};
  f.forEach(t=>{(g[t.cat]=g[t.cat]||[]).push(t)});
  return g;
}
function renderMaster(){
  const g=groupedTools();
  document.getElementById('mlist').innerHTML = Object.entries(g).map(([cat,tools])=>`
    <div class="m-group">
      <div class="section-label" style="padding:0 10px 4px">${CATEGORIES[cat]}</div>
      ${tools.map(t=>`
        <div class="m-item ${active===t.id?'active':''}" onclick="select('${t.id}')">
          <div class="m-icon">${toolIcon(t,16)}</div>
          <div class="m-info"><div class="m-name">${t.name}</div><div class="m-desc">${t.desc}</div></div>
          ${svg('chevronRight',14)}
        </div>`).join('')}
    </div>`).join('');
}
function renderDetail(){
  const t=TOOLS.find(x=>x.id===active);
  const d=document.getElementById('detail');
  d.innerHTML = `
    <div class="detail-head">
      <div class="tool-icon" style="width:36px;height:36px;border-radius:9px">${toolIcon(t,18)}</div>
      <div><div class="breadcrumb">工具箱 / ${CATEGORIES[t.cat]}</div><h1>${t.name}</h1></div>
      <span style="flex:1"></span>
      <button class="btn ghost">${svg('star',14)} 收藏</button>
      <button class="btn ghost">${svg('history',14)}</button>
    </div>
    <div style="flex:1;min-height:0">${toolBodyHTML(t)}</div>`;
}
document.getElementById('root').innerHTML = titlebarHTML()+`
  <div class="body">
    <aside class="master">
      <div class="master-head">
        <div class="m-search">${svg('search',15)}<input id="q" placeholder="搜索工具..." oninput="renderMaster()"/></div>
      </div>
      <div class="m-list" id="mlist"></div>
      <div style="padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px">
        <button class="btn ghost" style="flex:1">${svg('settings',14)} 设置</button>
      </div>
    </aside>
    <section class="detail" id="detail"></section>
  </div>`;
function select(id){ active=id; renderMaster(); renderDetail(); }
renderMaster(); renderDetail();
</script>
</body>
</html>
