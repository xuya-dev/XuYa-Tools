<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>③ 命令面板</title>
<link rel="stylesheet" href="shared.css">
<style>
  .app { height:100%; display:flex; flex-direction:column; }
  .stage { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; position:relative; }
  .hint { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--text-3); }
  .palette { width:100%; max-width:640px; background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.5); overflow:hidden; }
  .pal-input { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--border); }
  .pal-input input { flex:1; border:none; background:none; color:var(--text); font-size:18px; outline:none; }
  .pal-input input::placeholder { color:var(--text-3); }
  .pal-list { max-height:380px; overflow:auto; padding:8px; }
  .pal-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; cursor:pointer; transition:.1s; }
  .pal-item:hover, .pal-item.sel { background:var(--accent-soft); }
  .pal-item.sel { outline:1px solid var(--accent); }
  .pal-item .pi-icon { width:36px; height:36px; border-radius:9px; background:var(--input); display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0; }
  .pal-item .pi-info { flex:1; min-width:0; }
  .pal-item .pi-name { font-size:14px; font-weight:500; }
  .pal-item .pi-desc { font-size:11.5px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pal-item .pi-cat { font-size:10px; padding:2px 8px; border:1px solid var(--border); border-radius:99px; color:var(--text-3); }
  .pal-foot { padding:10px 16px; border-top:1px solid var(--border); display:flex; align-items:center; gap:16px; font-size:11px; color:var(--text-3); }
  .pal-foot kbd { font-size:10px; padding:2px 6px; border:1px solid var(--border); border-radius:4px; }
  .recent { position:absolute; bottom:24px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:640px; }
  .recent .chip { display:flex; align-items:center; gap:6px; padding:6px 12px; background:var(--card); border:1px solid var(--border); border-radius:99px; font-size:12px; color:var(--text-2); }
</style>
</head>
<body>
<div class="app" id="root"></div>
<script src="shared.js"></script>
<script src="toolbody.js"></script>
<script>
const root = document.getElementById('root');
root.innerHTML = titlebarHTML() + `
  <div class="stage">
    <div class="hint">点击下方工具或直接输入名称搜索 · 回车打开</div>
    <div class="palette">
      <div class="pal-input">${svg('search',20)}<input id="q" placeholder="搜索工具或输入命令..." autocomplete="off"/></div>
      <div class="pal-list" id="list"></div>
      <div class="pal-foot">
        <span><kbd>↑↓</kbd> 选择</span><span><kbd>↵</kbd> 打开</span><span><kbd>Esc</kbd> 清空</span>
        <span style="margin-left:auto">XuYa Tools</span>
      </div>
    </div>
    <div class="recent"><span style="font-size:11px;color:var(--text-3);align-self:center">最近:</span>
      ${TOOLS.slice(0,3).map(t=>`<div class="chip">${toolIcon(t,14)} ${t.name}</div>`).join('')}
    </div>
  </div>`;
const q=document.getElementById('q'), list=document.getElementById('list');
let sel=0;
function renderList(){
  const kw=q.value.trim().toLowerCase();
  const items = TOOLS.filter(t=>!kw||[t.name,t.desc,...t.id].join(' ').toLowerCase().includes(kw));
  if(!items.length){ list.innerHTML=`<div style="padding:30px;text-align:center;color:var(--text-3)">未找到匹配 "${q.value}" 的工具</div>`; return; }
  if(sel>=items.length) sel=items.length-1;
  list.innerHTML=items.map((t,i)=>`
    <div class="pal-item ${i===sel?'sel':''}" onmouseover="sel=${i};refreshSel()" onclick="openTool('${t.id}')">
      <div class="pi-icon">${toolIcon(t,18)}</div>
      <div class="pi-info"><div class="pi-name">${t.name}</div><div class="pi-desc">${t.desc}</div></div>
      <span class="pi-cat">${CATEGORIES[t.cat]}</span>
    </div>`).join('');
}
function refreshSel(){ document.querySelectorAll('.pal-item').forEach((e,i)=>e.classList.toggle('sel',i===sel)); }
q.addEventListener('input',()=>{sel=0;renderList();});
q.addEventListener('keydown',e=>{
  const items=list.querySelectorAll('.pal-item');
  if(e.key==='ArrowDown'){e.preventDefault();sel=Math.min(sel+1,items.length-1);refreshSel();}
  if(e.key==='ArrowUp'){e.preventDefault();sel=Math.max(sel-1,0);refreshSel();}
  if(e.key==='Enter'){e.preventDefault();if(items[sel])items[sel].click();}
  if(e.key==='Escape'){q.value='';renderList();}
});
renderList(); q.focus();
function openTool(id){
  const t=TOOLS.find(x=>x.id===id);
  const layer=document.createElement('div');
  layer.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:99';
  layer.innerHTML=`<div style="width:84%;max-width:920px;height:74%;background:var(--bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <button class="btn ghost" onclick="this.closest('.layer').remove()">${svg('back',14)} 返回</button><strong>${t.name}</strong>
    </div><div style="flex:1;overflow:auto;padding:22px">${toolBodyHTML(t)}</div></div>`;
  layer.className='layer'; layer.onclick=e=>{if(e.target===layer)layer.remove()}; document.body.appendChild(layer);
}
</script>
</body>
</html>
