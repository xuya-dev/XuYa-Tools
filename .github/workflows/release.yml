name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'XuYa Tools ${{ github.ref_name }}'
          draft: true
          body: |
            ## v1.0.3 更新内容

            本次新增 7 个开发常用工具,工具总数达到 34 个。

            ### ✨ 新增工具

            - **CSV 表格** — CSV 可视化预览,支持排序 / 筛选,一键转 JSON / Markdown / TSV / SQL,兼容 RFC 4180。
            - **JSON 转类型** — 粘贴 JSON 一键生成 Go / Rust / TypeScript / Java / Python 类型定义,递归推断嵌套结构。
            - **JSON 对比** — 按字段路径结构化对比两个 JSON,识别新增 / 删除 / 修改,支持忽略数组顺序。
            - **代码格式化** — 美化 / 压缩 XML、HTML、CSS、JavaScript 代码,纯前端实现。
            - **敏感脱敏** — 一键打码文本中的手机号 / 身份证 / 邮箱 / 银行卡 / IP,支持自定义正则规则。
            - **时间偏移** — 计算「N 天后是几号」「两日期相差多久」,支持工作日计算。
            - **端口检测** — 检测主机端口连通性,支持端口段批量扫描,显示握手耗时。

            ### 🔧 说明
            - 工具箱至此功能基本完整,后续重心转向体验打磨与稳定性。
            - 已装旧版本的用户,启动应用后会自动收到更新提示。

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 更新包签名 (用于自动更新校验)。私钥与密码存于 GitHub Secrets,
          # 公钥已写入 src-tauri/tauri.conf.json 的 plugins.updater.pubkey。
          # 配置后 tauri-action 会自动产出签名包 + latest.json 并上传到 Release。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'XuYa Tools ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
